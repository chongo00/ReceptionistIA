services:
  blindsbook-ia:
    build:
      context: .
      dockerfile: Dockerfile.cloud
    ports:
      - "127.0.0.1:4100:4000"
    environment:
      - PORT=4000
      - BLINDSBOOK_API_BASE_URL=${BLINDSBOOK_API_BASE_URL:-http://host.docker.internal:3000}
      - BLINDSBOOK_API_TOKEN=${BLINDSBOOK_API_TOKEN:-}
      - BLINDSBOOK_LOGIN_EMAIL=${BLINDSBOOK_LOGIN_EMAIL:-}
      - BLINDSBOOK_LOGIN_PASSWORD=${BLINDSBOOK_LOGIN_PASSWORD:-}
      - PHONE_TO_COMPANY_MAP=${PHONE_TO_COMPANY_MAP:-}
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-http://localhost:4100}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT:-}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY:-}
      - AZURE_OPENAI_DEPLOYMENT=${AZURE_OPENAI_DEPLOYMENT:-gpt-4o-mini}
      - AZURE_OPENAI_API_VERSION=${AZURE_OPENAI_API_VERSION:-2024-10-21}
      - AZURE_SPEECH_KEY=${AZURE_SPEECH_KEY:-}
      - AZURE_SPEECH_REGION=${AZURE_SPEECH_REGION:-}
      - AZURE_TTS_VOICE_ES=${AZURE_TTS_VOICE_ES:-es-MX-DaliaNeural}
      - AZURE_TTS_VOICE_EN=${AZURE_TTS_VOICE_EN:-en-US-JennyNeural}
      - VOICE_SIMULATOR_ENABLED=${VOICE_SIMULATOR_ENABLED:-true}
      - VOICE_LIVE_ENDPOINT=${VOICE_LIVE_ENDPOINT:-}
      - VOICE_LIVE_API_KEY=${VOICE_LIVE_API_KEY:-}
      - VOICE_LIVE_MODEL=${VOICE_LIVE_MODEL:-}
      - VOICE_LIVE_API_VERSION=${VOICE_LIVE_API_VERSION:-2025-10-01}
      - VOICE_BACKEND=${VOICE_BACKEND:-local}
      - LIVEKIT_WS_URL=${LIVEKIT_WS_URL:-}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:-}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:-}
    volumes:
      - ./public:/app/public:ro
    deploy:
      resources:
        limits:
          memory: 768M
    restart: unless-stopped
